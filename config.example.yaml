# Local-Phone configuration. Copy to config.yaml and edit.

# LLM backend: "ollama" (local, on-device — default) or "api" (remote, opt-in).
backend: ollama

# Model to use. Must match a model you've pulled (setup/pull-model.sh).
# Default is an uncensored security-tuned model so offensive-security tasks
# aren't refused. Swap for a lighter uncensored 7B (e.g. dolphin-mistral:7b)
# if you want it snappier on-device.
model: hf.co/TheBloke/WhiteRabbitNeo-13B-GGUF:Q4_K_M

# Local Ollama runtime.
ollama:
  host: http://localhost:11434

# Remote OpenAI-compatible backend (only used when backend: api).
api:
  base_url: https://api.openai.com/v1
  api_key_env: LLM_API_KEY   # read the key from this environment variable

# Sampling / generation options passed through to the backend.
options:
  temperature: 0.4

# Max seconds any single command may run before it's killed.
command_timeout: 300

# Research channel — web/OSINT lookups (the SEARCH: path and /search command).
# This is the ONLY thing that reaches the public internet, and it is routed
# through Tor for privacy. It fails closed: if Tor isn't up, searches are
# refused rather than sent over your real connection. Scans and target
# commands (RUN:) never use this — they stay on the direct interface.
research:
  enabled: true
  tor_socks: socks5h://127.0.0.1:9050   # socks5h => DNS also resolved via Tor
  search_url: "https://lite.duckduckgo.com/lite/?q={query}"
  user_agent: "Mozilla/5.0 (X11; Linux x86_64; rv:115.0) Gecko/20100101 Firefox/115.0"
  timeout: 45
  max_chars: 6000        # cap on fetched text handed to the model
  fail_closed: true      # never fetch if Tor is unreachable (keep this true)

# Background/long-run behavior (Termux/Android).
# While a turn is working, hold a CPU wakelock so generation keeps running with
# the screen off; release it when idle so the phone sleeps normally. Post an
# Android notification when a turn takes longer than min_seconds, so you can
# walk away and get pinged when it's done.
notify:
  enabled: true
  wake_lock: true        # keep the CPU awake during a turn (termux-wake-lock)
  min_seconds: 20        # only notify for turns longer than this many seconds
